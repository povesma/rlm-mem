    comments: allowed
    naming_convention: none
  testing:
    approach: none
    scope: []
    subagents: []
  workflow:
    docs_first: off
    correction_capture: false
    scope_drift: off

tools:
  rlm: false
  memory_backend: none

mcps:
  required: []
  optional: []
